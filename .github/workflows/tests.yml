name: Tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style-and-audit:
    name: brew style + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef  # 2026.07.20.1

      - name: Symlink checkout as the ai-agent-assembly/tap tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/ai-agent-assembly/homebrew-tap"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -sfn "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Run brew style on Formula/
        run: |
          if compgen -G "Formula/*.rb" > /dev/null; then
            brew style ai-agent-assembly/tap
          else
            echo "No formulas in Formula/ yet — skipping brew style."
          fi

      - name: Run brew audit on Formula/
        run: |
          if compgen -G "Formula/*.rb" > /dev/null; then
            brew audit --strict --tap ai-agent-assembly/tap
          else
            echo "No formulas in Formula/ yet — skipping brew audit."
          fi

  install-and-test-macos:
    name: brew install + test (macOS)
    runs-on: macos-latest
    # AAASM-2871: workaround for upstream Homebrew issue #22719
    # https://github.com/Homebrew/brew/issues/22719
    #
    # As of 2026-06-12, the Homebrew build sandbox raises an
    # UntrustedTapError silently inside `build.rb` because the
    # sandboxed child can't read the tap's git remote URL via
    # `git config --get remote.origin.url`. Failure surfaces only as
    # `sandbox-exec ... exited with 1` with zero stdout/stderr;
    # `--debug` reveals the swallowed UntrustedTapError stack.
    # Affects every tap (GitHub-remote or otherwise) using the
    # standard PR-time symlink-the-checkout-as-the-tap pattern.
    #
    # `HOMEBREW_NO_REQUIRE_TAP_TRUST=1` disables the parent-vs-child
    # trust mismatch by skipping the trust check entirely. This is
    # safe in CI: the tap content is the PR checkout we control;
    # there's no third-party tap being executed. Brew itself
    # documents this env in its own warning message when tap trust
    # is the gate. Remove once Homebrew lands a fix for #22719.
    #
    # Supersedes AAASM-2792 (which targeted the upstream build
    # profile — the formula installs a pre-built binary so source
    # build flags don't apply at install time).
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef  # 2026.07.20.1

      - name: Symlink checkout as the ai-agent-assembly/tap tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/ai-agent-assembly/homebrew-tap"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -sfn "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Install and test the formula
        run: |
          if compgen -G "Formula/*.rb" > /dev/null; then
            brew install --verbose ai-agent-assembly/tap/aasm
            brew test ai-agent-assembly/tap/aasm
          else
            echo "No formulas in Formula/ yet — skipping install/test."
          fi
