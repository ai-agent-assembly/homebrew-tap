name: Tests

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style-and-audit:
    name: brew style + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Symlink checkout as the agent-assembly/agent-assembly tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/agent-assembly/homebrew-agent-assembly"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -sfn "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Run brew style on Formula/
        run: |
          if compgen -G "Formula/*.rb" > /dev/null; then
            brew style agent-assembly/agent-assembly
          else
            echo "No formulas in Formula/ yet — skipping brew style."
          fi

      - name: Run brew audit on Formula/
        run: |
          if compgen -G "Formula/*.rb" > /dev/null; then
            brew audit --strict --tap agent-assembly/agent-assembly
          else
            echo "No formulas in Formula/ yet — skipping brew audit."
          fi

  install-and-test-macos:
    name: brew install + test (macOS)
    runs-on: macos-latest
    # AAASM-2871: the macos-latest runner's stricter sandbox-exec policy
    # silently kills the Ruby build subprocess (~1.2s after "Installing aasm")
    # with zero stdout/stderr produced. The formula's install block is a
    # trivial `bin.install "aasm"` (binary tarball, no compilation), so the
    # sandbox adds no defense-in-depth here — only blocks the file copy.
    # Disabling matches the standard fix used by many binary-tarball taps.
    # (Supersedes AAASM-2792's incorrect attempt to fix this via build-profile
    # changes upstream — those couldn't affect install-time behavior.)
    env:
      HOMEBREW_NO_SANDBOX: 1
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@2ebcf16054461267868620b1414507f3ccc765c1  # master

      - name: Symlink checkout as the agent-assembly/agent-assembly tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/agent-assembly/homebrew-agent-assembly"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -sfn "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Install and test the formula
        run: |
          if compgen -G "Formula/*.rb" > /dev/null; then
            brew install --verbose agent-assembly/agent-assembly/aasm
            brew test agent-assembly/agent-assembly/aasm
          else
            echo "No formulas in Formula/ yet — skipping install/test."
          fi
