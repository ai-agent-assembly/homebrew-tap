name: Tests

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style-and-audit:
    name: brew style + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Symlink checkout as the agent-assembly/agent-assembly tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/agent-assembly/homebrew-agent-assembly"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -sfn "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Run brew style on Formula/
        run: |
          if compgen -G "Formula/*.rb" > /dev/null; then
            brew style agent-assembly/agent-assembly
          else
            echo "No formulas in Formula/ yet — skipping brew style."
          fi

      - name: Run brew audit on Formula/
        run: |
          if compgen -G "Formula/*.rb" > /dev/null; then
            brew audit --strict --tap agent-assembly/agent-assembly
          else
            echo "No formulas in Formula/ yet — skipping brew audit."
          fi

  install-and-test-macos:
    name: brew install + test (macOS)
    # AAASM-2871: pin to macos-14 instead of macos-latest.
    #
    # The macos-latest label moved from macos-14 to macos-15 (Sequoia)
    # around 2026-06-08. macos-15's stricter sandbox-exec policy kills
    # the Homebrew `build.rb` subprocess silently — ~1.2s after
    # "Installing aasm", zero stdout/stderr, exit code 1. Confirmed by
    # CI run history: every tap run before 2026-06-08 succeeded on
    # macos-latest; every run on or after has failed identically.
    #
    # There is no env-var workaround on macOS. HOMEBREW_NO_SANDBOX only
    # ever existed for Cask + Linux (Library/Homebrew/env_config.rb);
    # OS::Mac::Sandbox.available? just checks `/usr/bin/sandbox-exec`
    # exists, so the macOS build sandbox is unconditional once Homebrew
    # decides to use it.
    #
    # Revisit once Homebrew patches the macos-15 sandbox profile.
    # Supersedes AAASM-2792 (which targeted the wrong workflow — the
    # formula installs a pre-built binary so source build profiles
    # don't apply).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@2ebcf16054461267868620b1414507f3ccc765c1  # master

      - name: Symlink checkout as the agent-assembly/agent-assembly tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/agent-assembly/homebrew-agent-assembly"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -sfn "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Install and test the formula
        run: |
          if compgen -G "Formula/*.rb" > /dev/null; then
            brew install --verbose agent-assembly/agent-assembly/aasm
            brew test agent-assembly/agent-assembly/aasm
          else
            echo "No formulas in Formula/ yet — skipping install/test."
          fi
