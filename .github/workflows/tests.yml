name: Tests

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style-and-audit:
    name: brew style + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Symlink checkout as the agent-assembly/agent-assembly tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/agent-assembly/homebrew-agent-assembly"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -sfn "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Run brew style on Formula/
        run: |
          if compgen -G "Formula/*.rb" > /dev/null; then
            brew style agent-assembly/agent-assembly
          else
            echo "No formulas in Formula/ yet — skipping brew style."
          fi

      - name: Run brew audit on Formula/
        run: |
          if compgen -G "Formula/*.rb" > /dev/null; then
            brew audit --strict --tap agent-assembly/agent-assembly
          else
            echo "No formulas in Formula/ yet — skipping brew audit."
          fi

  install-and-test-macos:
    name: brew install + test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@2ebcf16054461267868620b1414507f3ccc765c1  # master
        with:
          # AAASM-2871: pin Homebrew to the latest stable tag (6.0.1).
          #
          # Homebrew master HEAD broke macOS formula installs on
          # 2026-06-08 via a sandbox refactor (commits 080ffb3d
          # "sandbox: deny all of $HOME except Homebrew dirs", 2f1cb508
          # "Route sandbox setup through brew setup-sandbox", etc.).
          # The PTY.open path in sandbox.rb now exits 1 silently for
          # binary-tarball formulas like ours. Every tap run before
          # 2026-06-08 succeeded on master HEAD; every run after fails.
          #
          # `stable: true` overrides the default for tap repos
          # (which is `stable: false` → master HEAD) and instead pins
          # to the most recent Homebrew release tag — 6.0.1, cut
          # 2026-06-12 01:00 UTC, which pre-dates the broken commits.
          # Revisit once Homebrew ships a fix on a later tag.
          #
          # Supersedes AAASM-2792 (which targeted the upstream build
          # profile — the formula installs a pre-built binary so
          # source build flags don't apply).
          stable: true

      - name: Symlink checkout as the agent-assembly/agent-assembly tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/agent-assembly/homebrew-agent-assembly"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -sfn "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Install and test the formula
        run: |
          if compgen -G "Formula/*.rb" > /dev/null; then
            brew install --verbose agent-assembly/agent-assembly/aasm
            brew test agent-assembly/agent-assembly/aasm
          else
            echo "No formulas in Formula/ yet — skipping install/test."
          fi
